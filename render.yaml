services:
  - type: worker
    name: autodrop-worker
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npx tsx workers/server.ts
    envVars:
      - key: REDIS_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://autodrop.in
      - key: OPENAI_API_KEY
        sync: false
